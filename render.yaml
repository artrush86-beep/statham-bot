services:
  - type: web
    name: statham-bot
    runtime: python
    pythonVersion: "3.11.9"      # ← добавь эту строку
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn_config.py

    envVars:
      # ── Telegram ──────────────────────────────────────────────────
      - key: TG_TOKEN
        sync: false          # токен бота 8241319215:AAHHLVM-...
      - key: TG_CHAT
        sync: false          # -1003867089540
      - key: TG_SIGNALS_TOPIC
        value: "6314"        # ID ветки сигналов
      - key: TG_SESSIONS_TOPIC
        value: "6314"           # ID ветки сессий и F&G


      # ── Render ────────────────────────────────────────────────────
      - key: RENDER_URL
        sync: false          # https://statham-bot-dpvt.onrender.com

      # ── Bybit (РЕАЛЬНЫЕ ДЕНЬГИ) ───────────────────────────────────
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: TESTNET
        value: "false"       # false = реальная торговля
      - key: BYBIT_PAIRS
        value: "EDGEUSDT,STOUSDT,FARTCOINUSDT,WLDUSDT,ZBTUSDT"

      # ── BingX (ДЕМО) ──────────────────────────────────────────────
      - key: BINGX_API_KEY
        sync: false
      - key: BINGX_API_SECRET
        sync: false
      - key: BINGX_DEMO
        value: "true"        # true = демо-счёт
      - key: BINGX_PAIRS
        value: "ASTERUSDT,YBUSDT,UNIUSDT,SIRENUSDT,BLESSUSDT"

      # ── Администраторы ────────────────────────────────────────────
      - key: ADMIN_IDS
        sync: false          # твой Telegram user_id: 7617558315

      # ── Торговля — глобальные дефолты (перекрываются в коде) ──────
      - key: DEFAULT_LEVERAGE
        value: "10"
      - key: DEFAULT_SIZE_USDT
        value: "1"
      - key: TRAIL_PCT
        value: "0.5"

      # ── Настройки по паре (перекрывают дефолты биржи) ────────────
      # Bybit: 10x / 1 USDT | BingX: 20x / 30 USDT (задано в коде)
      # Здесь можно добавить исключения для конкретных пар:
      - key: PAIR_SETTINGS_JSON
        value: '{}'
        # Пример переопределения:
        # '{"YBUSDT":{"leverage":15,"size_usdt":2}}'

      # ── Хранилище ─────────────────────────────────────────────────
      - key: DATA_DIR
        value: "/tmp"

      # ── Upstash Redis (постоянное хранилище сделок) ───────────────
      - key: REDIS_URL
        sync: false          # redis://default:PASSWORD@HOST.upstash.io:PORT
